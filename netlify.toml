[build]
  publish = "."
  command = "node ./scripts/gen-runtime-config.js"

[build.environment]
  # Deze waardes horen NIET leeg te zijn in Netlify UI.
  # Laat ze hier weg of als fallback; maar UI is leidend per environment.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "assets/js/config.runtime.js"

# FORCE WWW (canonical host)
[[redirects]]
  from = "https://enval.nl/*"
  to = "https://www.enval.nl/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://enval.nl/*"
  to = "https://www.enval.nl/:splat"
  status = 301
  force = true

# LEGACY ONLY
[[redirects]]
  from = "/installateur"
  to = "/legacy/installateur.html"
  status = 302

[[redirects]]
  from = "/installateur.html"
  to = "/legacy/installateur.html"
  status = 302

[[redirects]]
  from = "/mandaat"
  to = "/legacy/mandaat.html"
  status = 302

[[redirects]]
  from = "/mandaat.html"
  to = "/legacy/mandaat.html"
  status = 302