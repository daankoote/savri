[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "assets/js/config.runtime.js"


[build]
  publish = "."
  command = """
    mkdir -p ./assets/js

    cat > ./assets/js/config.runtime.js <<EOF
// GENERATED — DO NOT COMMIT
window.ENVAL = window.ENVAL || {};
window.ENVAL.SUPABASE_URL = "${SUPABASE_URL}";
window.ENVAL.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
EOF
  """


# --- Legacy hard kill: installer routes (frontend + SEO hygiene) ---
[[redirects]]
from = "/installateur"
to = "/legacy/installateur.html"
status = 302

[[redirects]]
from = "/installateur.html"
to = "/legacy/installateur.html"
status = 302

